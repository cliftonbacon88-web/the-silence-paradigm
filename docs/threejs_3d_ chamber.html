<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 0 Shielded Chamber — TSP-ENG-001 Rev B · The Silence Project</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #05070e; font-family: -apple-system, Inter, Helvetica, Arial, sans-serif; color: #cfe0f0; }
  #app { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; }
  .tsp-panel{position:absolute;font-family:-apple-system,Inter,Helvetica,Arial,sans-serif;color:#cfe0f0;
    background:linear-gradient(180deg,rgba(12,18,30,0.86),rgba(8,12,22,0.72));
    border:1px solid rgba(120,170,220,0.22);border-radius:10px;backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);box-shadow:0 6px 22px rgba(0,0,0,0.45);
    padding:11px 12px;font-size:11.5px;line-height:1.35;pointer-events:auto;z-index:10;}
  .tsp-panel h4{margin:0 0 8px 0;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
    color:#7dc3ff;font-weight:600;}
  .tsp-row{display:flex;align-items:center;gap:7px;padding:3px 0;cursor:pointer;user-select:none;}
  .tsp-row:hover{color:#fff;}
  .tsp-sw{width:14px;height:14px;border-radius:3px;border:1px solid rgba(200,210,230,0.5);
    display:inline-block;flex-shrink:0;position:relative;}
  .tsp-sw.on{background:currentColor;border-color:currentColor;}
  .tsp-sw.on::after{content:'';position:absolute;left:3px;top:0px;width:4px;height:8px;
    border:solid #0a0e18;border-width:0 2px 2px 0;transform:rotate(45deg);}
  .tsp-sub{opacity:0.65;font-size:10px;margin-left:2px;}
  .tsp-btn{background:rgba(80,140,220,0.15);border:1px solid rgba(120,170,220,0.4);
    color:#cfe0f0;padding:5px 9px;border-radius:6px;font-size:10.5px;cursor:pointer;
    margin:2px 3px 2px 0;letter-spacing:0.04em;transition:all 0.15s;font-family:inherit;}
  .tsp-btn:hover{background:rgba(120,180,240,0.32);color:#fff;}
  .tsp-btn.active{background:rgba(180,120,255,0.45);border-color:#c8a0ff;color:#fff;
    box-shadow:0 0 8px rgba(180,120,255,0.55);}
  .tsp-readout{font-family:'SF Mono',Menlo,monospace;font-size:10.5px;color:#9adfff;
    border-top:1px solid rgba(120,170,220,0.18);margin-top:8px;padding-top:7px;}
  .tsp-key{color:#7dc3ff;} .tsp-val{color:#fff;} .tsp-state{color:#cba8ff;font-weight:600;}
  .tsp-legend{position:absolute;left:10px;bottom:10px;}
  .tsp-cond{position:absolute;right:10px;bottom:10px;max-width:240px;}
  .tsp-status{position:absolute;right:10px;top:10px;max-width:240px;}
  .tsp-title{position:absolute;top:10px;left:50%;transform:translateX(-50%);
    font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:#7dc3ff;
    background:rgba(8,12,22,0.6);padding:6px 14px;border-radius:6px;
    border:1px solid rgba(120,170,220,0.2);pointer-events:none;}
</style>
</head>
<body>
<div id="app">
  <canvas id="c"></canvas>
  <div class="tsp-title">The Silence Project · Phase 0 Shielded Chamber · TSP-ENG-001 Rev B</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.181.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.181.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const canvas = document.getElementById('c');
let width = window.innerWidth;
let height = window.innerHeight;

// ---------- Scene ----------
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05070d, 0.018);

const camera = new THREE.PerspectiveCamera(40, width/height, 0.05, 400);
camera.position.set(11, 6.5, 11);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setClearColor(0x05070e, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.sortObjects = true;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(width, height), 0.5, 0.7, 0.20);
composer.addPass(bloom);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.target.set(1.0, 1.4, 0);
controls.maxDistance = 32;
controls.minDistance = 2.5;
controls.maxPolarAngle = Math.PI * 0.49;

scene.add(new THREE.AmbientLight(0x445066, 0.55));
const keyLight = new THREE.DirectionalLight(0xfff1dc, 0.85); keyLight.position.set(9, 14, 7); scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x8aa8ff, 0.45); fillLight.position.set(-10, 7, -8); scene.add(fillLight);
const interiorLight = new THREE.PointLight(0xb8e8ff, 1.0, 8, 2); interiorLight.position.set(0, 1.9, 0); scene.add(interiorLight);
const airlockLight = new THREE.PointLight(0xffd9a0, 0.55, 3.5, 2); airlockLight.position.set(2.9, 1.5, 0); scene.add(airlockLight);

// ---------- Foundation ----------
const slab = new THREE.Mesh(
  new THREE.BoxGeometry(10.0, 0.30, 8.0),
  new THREE.MeshStandardMaterial({ color: 0x161c28, roughness: 0.95, metalness: 0.0 })
);
slab.position.set(0.5, -0.16, 0); scene.add(slab);

const slabGrid = new THREE.GridHelper(10, 20, 0x2a3a55, 0x16223a);
slabGrid.position.set(0.5, -0.005, 0); slabGrid.material.transparent = true; slabGrid.material.opacity = 0.7;
scene.add(slabGrid);

(function(){
  const start = new THREE.Vector3(2.38, 0.1, -2.0);
  const mid   = new THREE.Vector3(2.6, 0.05, -2.3);
  const end   = new THREE.Vector3(3.5, -0.005, -2.8);
  const curve = new THREE.CatmullRomCurve3([start, mid, end]);
  const geo = new THREE.TubeGeometry(curve, 20, 0.018, 8, false);
  const mat = new THREE.MeshStandardMaterial({ color: 0xc97c3a, metalness: 0.85, roughness: 0.3 });
  scene.add(new THREE.Mesh(geo, mat));
})();

// ---------- Five-layer shells ----------
const layerDefs = [
  { id:'L1',  outer:3.30, color:0xf2ead9, opacity:0.10, name:'Layer 1',  sub:'Acoustic + Active Thermal',  spec:'Foam + aerogel + Peltier liner · ±0.01 K' },
  { id:'L2a', outer:3.38, color:0xb6c3d2, opacity:0.13, name:'Layer 2a', sub:'Inner μ-metal',              spec:'3 mm μ-metal · gradient suppression' },
  { id:'GAP', outer:3.58, color:0x66ccff, opacity:0.04, name:'Air gap',  sub:'50 mm radial',               spec:'~3× magnetic shielding factor' },
  { id:'L2b', outer:3.66, color:0xb6c3d2, opacity:0.13, name:'Layer 2b', sub:'Outer μ-metal',              spec:'3 mm μ-metal · >80 dB combined' },
  { id:'L3',  outer:3.76, color:0xd07a3a, opacity:0.16, name:'Layer 3',  sub:'OFHC copper RF',             spec:'2 mm Cu · >100 dB (10 kHz–10 GHz)' },
  { id:'L4',  outer:4.20, color:0x4a5564, opacity:0.14, name:'Layer 4',  sub:'Vibration frame',            spec:'Pneumatic isolators · <10⁻⁶ m/s²' },
  { id:'L5',  outer:4.76, color:0x96a1b3, opacity:0.10, name:'Layer 5',  sub:'Outer Faraday',              spec:'Al shell + Cu mesh · >120 dB EM' },
];
const layerGroups = {};
function makeLayerShell(def){
  const g = new THREE.Group(); g.userData = def;
  const mat = new THREE.MeshStandardMaterial({
    color: def.color, transparent: true, opacity: def.opacity, side: THREE.DoubleSide,
    metalness: def.id==='L3'?0.85:(def.id==='L5'?0.6:0.4), roughness: 0.45, depthWrite: false,
  });
  const geo = new THREE.BoxGeometry(def.outer, def.outer, def.outer);
  const mesh = new THREE.Mesh(geo, mat); mesh.position.y = def.outer/2; g.add(mesh);
  const eg = new THREE.EdgesGeometry(geo);
  const em = new THREE.LineBasicMaterial({ color: def.color, transparent: true, opacity: 0.92 });
  const wire = new THREE.LineSegments(eg, em); wire.position.y = def.outer/2; g.add(wire);
  return g;
}
layerDefs.forEach(def => { const grp = makeLayerShell(def); scene.add(grp); layerGroups[def.id] = grp; });

(function(){
  const size = 4.76, div = 22, half = size/2;
  const mat = new THREE.LineBasicMaterial({ color: 0xb6c8d8, transparent:true, opacity:0.13 });
  const pts = [];
  for (let i=1;i<div;i++){
    const t = -half + (size*i/div);
    pts.push(new THREE.Vector3( half, 0, t),       new THREE.Vector3( half, size, t));
    pts.push(new THREE.Vector3(-half, 0, t),       new THREE.Vector3(-half, size, t));
    pts.push(new THREE.Vector3( half, t+half,-half), new THREE.Vector3( half, t+half, half));
    pts.push(new THREE.Vector3(-half, t+half,-half), new THREE.Vector3(-half, t+half, half));
    pts.push(new THREE.Vector3(t, 0, half),        new THREE.Vector3(t, size, half));
    pts.push(new THREE.Vector3(t, 0,-half),        new THREE.Vector3(t, size,-half));
    pts.push(new THREE.Vector3(-half, t+half, half), new THREE.Vector3( half, t+half, half));
    pts.push(new THREE.Vector3(-half, t+half,-half), new THREE.Vector3( half, t+half,-half));
  }
  scene.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(pts), mat));
})();

(function(){
  const pneuMat = new THREE.MeshStandardMaterial({ color:0x29303c, metalness:0.5, roughness:0.4 });
  const cylMat  = new THREE.MeshStandardMaterial({ color:0x5e6878, metalness:0.6, roughness:0.35 });
  const half4 = 4.20/2;
  const positions = [
    [ half4-0.2, -1.95], [-(half4-0.2), -1.95],
    [ half4-0.2,  1.95], [-(half4-0.2),  1.95],
  ];
  positions.forEach(([x,z])=>{
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 0.18, 14), pneuMat);
    base.position.set(x, 0.09, z); scene.add(base);
    const air = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.14, 14), cylMat);
    air.position.set(x, 0.25, z); scene.add(air);
  });
})();

// ---------- Airlock ----------
(function buildAirlock(){
  const grp = new THREE.Group();
  const xWest = 2.38, outerD = 2.12, outerW = 2.00, outerH = 2.90;
  const xCenter = xWest + outerD/2;
  function box(w, h, d, color, opacity, metalness) {
    const m = new THREE.MeshStandardMaterial({
      color, transparent:true, opacity, side:THREE.DoubleSide,
      metalness:(metalness??0.5), roughness:0.45, depthWrite:false,
    });
    const g = new THREE.BoxGeometry(w, h, d);
    const mesh = new THREE.Mesh(g, m);
    const wire = new THREE.LineSegments(
      new THREE.EdgesGeometry(g),
      new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.85 })
    );
    return { mesh, wire };
  }
  let s = box(outerD, outerH, outerW, 0x96a1b3, 0.11, 0.6);
  s.mesh.position.set(xCenter, outerH/2, 0); s.wire.position.copy(s.mesh.position);
  grp.add(s.mesh); grp.add(s.wire);
  s = box(outerD - 0.18, outerH - 0.18, outerW - 0.18, 0x4a5564, 0.13, 0.5);
  s.mesh.position.set(xCenter, (outerH - 0.18)/2 + 0.09, 0); s.wire.position.copy(s.mesh.position);
  grp.add(s.mesh); grp.add(s.wire);
  s = box(outerD - 0.34, outerH - 0.34, outerW - 0.34, 0xd07a3a, 0.18, 0.85);
  s.mesh.position.set(xCenter, (outerH - 0.34)/2 + 0.17, 0); s.wire.position.copy(s.mesh.position);
  grp.add(s.mesh); grp.add(s.wire);
  s = box(outerD - 0.42, outerH - 0.42, outerW - 0.42, 0xb6c3d2, 0.16, 0.4);
  s.mesh.position.set(xCenter, (outerH - 0.42)/2 + 0.21, 0); s.wire.position.copy(s.mesh.position);
  grp.add(s.mesh); grp.add(s.wire);
  s = box(outerD - 0.52, outerH - 0.52, outerW - 0.52, 0xf2ead9, 0.13, 0.3);
  s.mesh.position.set(xCenter, (outerH - 0.52)/2 + 0.26, 0); s.wire.position.copy(s.mesh.position);
  grp.add(s.mesh); grp.add(s.wire);

  const cavGeo = new THREE.BoxGeometry(1.0, 2.3, 1.2);
  const cavWire = new THREE.LineSegments(
    new THREE.EdgesGeometry(cavGeo),
    new THREE.LineBasicMaterial({ color: 0x66ddff, transparent:true, opacity:0.55 })
  );
  cavWire.position.set(xCenter, 1.15 + 0.10, 0); grp.add(cavWire);

  const floorPad = new THREE.Mesh(
    new THREE.BoxGeometry(1.0, 0.04, 1.2),
    new THREE.MeshStandardMaterial({ color: 0x2a323e, roughness:0.85 })
  );
  floorPad.position.set(xCenter, 0.30, 0); grp.add(floorPad);

  const doorMat = new THREE.MeshStandardMaterial({
    color:0xa8b8c4, metalness:0.75, roughness:0.32, transparent:true, opacity:0.95,
  });
  const innerDoor = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.1, 1.0), doorMat);
  innerDoor.position.set(xWest, 1.05 + 0.05, 0); grp.add(innerDoor);
  (function(){
    const pts = [];
    [xWest].forEach(x=>{
      pts.push(new THREE.Vector3(x,0.10,-0.5), new THREE.Vector3(x,2.20,-0.5));
      pts.push(new THREE.Vector3(x,2.20,-0.5), new THREE.Vector3(x,2.20, 0.5));
      pts.push(new THREE.Vector3(x,2.20, 0.5), new THREE.Vector3(x,0.10, 0.5));
      pts.push(new THREE.Vector3(x,0.10, 0.5), new THREE.Vector3(x,0.10,-0.5));
    });
    grp.add(new THREE.LineSegments(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color:0xffcc66, transparent:true, opacity:0.7 })
    ));
  })();
  const panic = new THREE.Mesh(
    new THREE.BoxGeometry(0.05, 0.07, 0.78),
    new THREE.MeshStandardMaterial({ color:0xff2a2a, emissive:0xff2222, emissiveIntensity:0.85, metalness:0.4, roughness:0.4 })
  );
  panic.position.set(xWest + 0.07, 1.05, 0); grp.add(panic);
  [-0.30, 0.30].forEach(dz => {
    const br = new THREE.Mesh(
      new THREE.BoxGeometry(0.05, 0.10, 0.04),
      new THREE.MeshStandardMaterial({ color:0x9aa2ad, metalness:0.6, roughness:0.4 })
    );
    br.position.set(xWest + 0.07, 1.05, dz); grp.add(br);
  });

  const xOuterDoor = xWest + outerD;
  const outerDoor = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.1, 1.0), doorMat.clone());
  outerDoor.position.set(xOuterDoor, 1.10, 0); grp.add(outerDoor);
  const handle = new THREE.Mesh(
    new THREE.CylinderGeometry(0.018, 0.018, 0.15, 10),
    new THREE.MeshStandardMaterial({ color:0xc9c9c9, metalness:0.8, roughness:0.25 })
  );
  handle.rotation.z = Math.PI/2;
  handle.position.set(xOuterDoor - 0.07, 1.05, -0.36); grp.add(handle);

  const interlock = new THREE.Mesh(
    new THREE.SphereGeometry(0.045, 14, 12),
    new THREE.MeshStandardMaterial({ color:0x44ff66, emissive:0x22ff44, emissiveIntensity:1.8 })
  );
  interlock.position.set(xCenter, outerH - 0.40, -0.70); grp.add(interlock);

  const rfPillar = new THREE.Mesh(
    new THREE.BoxGeometry(0.12, 1.20, 0.12),
    new THREE.MeshStandardMaterial({ color:0x1a2230, metalness:0.5, roughness:0.4 })
  );
  rfPillar.position.set(xCenter + 0.28, 0.92, 0.42); grp.add(rfPillar);
  const rfHead = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 16, 12),
    new THREE.MeshStandardMaterial({ color:0x331a06, emissive:0xff8844, emissiveIntensity:1.3 })
  );
  rfHead.position.set(xCenter + 0.28, 1.55, 0.42); grp.add(rfHead);
  const flux2 = new THREE.Mesh(
    new THREE.BoxGeometry(0.10, 0.10, 0.10),
    new THREE.MeshStandardMaterial({ color:0x335577, metalness:0.5, roughness:0.4, emissive:0x113355, emissiveIntensity:0.4 })
  );
  flux2.position.set(xCenter - 0.30, 0.40, -0.42); grp.add(flux2);
  const o2a = new THREE.Mesh(
    new THREE.BoxGeometry(0.07, 0.10, 0.04),
    new THREE.MeshStandardMaterial({ color:0x141a22, emissive:0x33ddff, emissiveIntensity:1.0 })
  );
  o2a.position.set(xCenter - 0.30, 2.00, 0.40); grp.add(o2a);
  const ceilingLED = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 14, 10),
    new THREE.MeshStandardMaterial({ color:0xfff3d0, emissive:0xffeeaa, emissiveIntensity:1.4 })
  );
  ceilingLED.position.set(xCenter, outerH - 0.40, 0); grp.add(ceilingLED);

  scene.add(grp);
})();

// ---------- Interior ----------
const interior = new THREE.Group();
scene.add(interior);

const innerFloor = new THREE.Mesh(
  new THREE.BoxGeometry(3.0, 0.02, 3.0),
  new THREE.MeshStandardMaterial({ color:0x10161e, roughness:0.85, metalness:0.2 })
);
innerFloor.position.y = 0.01; interior.add(innerFloor);

const innerGrid = new THREE.GridHelper(3.0, 12, 0x2a4258, 0x182838);
innerGrid.position.y = 0.022; interior.add(innerGrid);

(function(){
  const r = new THREE.Mesh(
    new THREE.RingGeometry(0.46, 0.50, 48),
    new THREE.MeshBasicMaterial({ color:0x66ddff, transparent:true, opacity:0.55, side:THREE.DoubleSide })
  );
  r.rotation.x = -Math.PI/2; r.position.y = 0.025; interior.add(r);
})();

(function(){
  const ductMat = new THREE.MeshStandardMaterial({ color:0x6a7484, metalness:0.5, roughness:0.45 });
  const duct = new THREE.Mesh(new THREE.BoxGeometry(0.60, 0.10, 0.60), ductMat);
  duct.position.set(0, 2.95, 0); interior.add(duct);
  for (let i=-2;i<=2;i++){
    const lv = new THREE.Mesh(
      new THREE.BoxGeometry(0.56, 0.012, 0.05),
      new THREE.MeshStandardMaterial({ color:0x202830, roughness:0.7 })
    );
    lv.position.set(0, 2.89, i*0.10); interior.add(lv);
  }
})();

(function(){
  const camBody = new THREE.Mesh(
    new THREE.BoxGeometry(0.10, 0.07, 0.12),
    new THREE.MeshStandardMaterial({ color:0x14191f, metalness:0.5, roughness:0.45 })
  );
  camBody.position.set(-1.40, 2.78, -1.40); interior.add(camBody);
  const lens = new THREE.Mesh(
    new THREE.CylinderGeometry(0.022, 0.028, 0.05, 14),
    new THREE.MeshStandardMaterial({ color:0x111316, emissive:0x882211, emissiveIntensity:1.2, metalness:0.7, roughness:0.25 })
  );
  lens.rotation.x = Math.PI/2;
  lens.position.set(-1.34, 2.78, -1.34); interior.add(lens);
})();

(function(){
  const panel = new THREE.Mesh(
    new THREE.BoxGeometry(0.18, 0.20, 0.02),
    new THREE.MeshStandardMaterial({ color:0x222a33, roughness:0.55, metalness:0.4 })
  );
  panel.position.set(0.4, 1.4, -1.49); interior.add(panel);
  const led = new THREE.Mesh(
    new THREE.SphereGeometry(0.012, 8, 6),
    new THREE.MeshStandardMaterial({ color:0x66ff88, emissive:0x44ff66, emissiveIntensity:1.4 })
  );
  led.position.set(0.46, 1.45, -1.48); interior.add(led);
})();

// ============================================================
// OBSERVER — anatomically articulated lotus-seated meditator
// Sukhasana (easy cross-legged seat). Skin tone for exposed
// limbs; robe color for torso/thighs/upper arms. Hands rest on
// knees in chin mudra. Spine erect; eyes closed.
// ============================================================
const observer = new THREE.Group(); observer.position.set(0, 0, 0);

const skinMat = new THREE.MeshStandardMaterial({ color:0xefd4b5, roughness:0.55, metalness:0.02 });
const robeMat = new THREE.MeshStandardMaterial({ color:0x2a3140, roughness:0.85, metalness:0.02 });
const eyeMat  = new THREE.MeshStandardMaterial({ color:0xc09a82, roughness:0.55, metalness:0.02 });

// Helper: rigid limb between two world points
function limb(p1, p2, r, mat) {
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const len = dir.length();
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r*0.95, r, len, 16), mat);
  m.position.copy(p1).lerp(p2, 0.5);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
  return m;
}

// Zafu cushion
const cushion = new THREE.Mesh(
  new THREE.CylinderGeometry(0.42, 0.46, 0.13, 32),
  new THREE.MeshStandardMaterial({ color:0x4a2818, roughness:0.92, metalness:0.04 })
);
cushion.position.y = 0.065; observer.add(cushion);

// === LOTUS / SUKHASANA SEATED LEGS ===
// Anchor anatomy
const hipL    = new THREE.Vector3(-0.10, 0.20,  0.04);
const hipR    = new THREE.Vector3( 0.10, 0.20,  0.04);
const kneeL   = new THREE.Vector3(-0.34, 0.16,  0.22);
const kneeR   = new THREE.Vector3( 0.34, 0.16,  0.22);
const ankleL  = new THREE.Vector3( 0.20, 0.085, 0.20); // crosses to right
const ankleR  = new THREE.Vector3(-0.20, 0.085, 0.20); // crosses to left

// Pelvis (under torso, robe-covered)
const pelvis = new THREE.Mesh(new THREE.SphereGeometry(0.18, 22, 16), robeMat);
pelvis.scale.set(1.25, 0.70, 1.0);
pelvis.position.set(0, 0.21, 0.02); observer.add(pelvis);

// Thighs (robe)
observer.add(limb(hipL, kneeL, 0.090, robeMat));
observer.add(limb(hipR, kneeR, 0.090, robeMat));
// Knee caps

// ---------- Animation loop ----------
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.autoRotate = rotateOn;
  controls.autoRotateSpeed = 0.30;
  controls.update();

  const breathRate = activeCondition.breath;
  const breath = Math.sin(t * breathRate * 1.4) * 0.5 + 0.5;
  torso.scale.set(1, 1 + breath*0.014, 1);
  observer.position.y = breath * 0.012;

  aura.material.color.lerp(new THREE.Color(activeCondition.auraColor), 0.06);
  aura.material.opacity += (activeCondition.auraOpacity - aura.material.opacity) * 0.06;
  aura.scale.setScalar(0.95 + 0.10 * Math.sin(t * (breathRate*0.9)));

  respBand.material.emissiveIntensity = 0.6 + breath * 1.4;
  const heartBeat = Math.pow(Math.sin(t * 1.2), 60);
  ecgPatch.material.emissiveIntensity = 0.7 + heartBeat * 2.0;

  brainCore.material.color.lerp(new THREE.Color(activeCondition.color), 0.08);
  brainCore.scale.setScalar(0.85 + 0.18*Math.sin(t * (breathRate*1.2) + 1));

  for (let i=0;i<electrodes.length;i++){
    const e = electrodes[i]; const ph = e.userData.phase;
    const pulse = 0.6 + 0.4*Math.sin(t*8 + ph);
    e.material.emissiveIntensity = (0.7 + pulse) * activeCondition.electrode * 1.2;
    if (activeCondition.id === 'C7' || activeCondition.id === 'C3') e.material.emissive.setHex(0xffcc55);
    else if (activeCondition.id === 'C6') e.material.emissive.setHex(0x4466aa);
    else e.material.emissive.setHex(0x55ffaa);
  }

  nvDiamond.material.emissiveIntensity = 1.2 + ((Math.sin(t*6)+1)*0.5)*1.8;
  nvDiamond.rotation.y += 0.012; nvDiamond.rotation.x += 0.008;
  const t2Factor = (activeCondition.id === 'C5' || activeCondition.id === 'C6') ? 1.35 : 1.0;
  coherenceRing.scale.setScalar((1 + 0.18*Math.sin(t*4)) * t2Factor);
  coherenceRing.material.opacity = 0.35 + 0.25*Math.sin(t*4);
  if (activeCondition.id === 'C5') coherenceRing.material.color.setHex(0xb98cff);
  else if (activeCondition.id === 'C6') coherenceRing.material.color.setHex(0x6a44cc);
  else coherenceRing.material.color.setHex(0xff3366);

  laser.material.opacity = 0.45 + 0.20*Math.sin(t*3);

  qrngLEDs.forEach(led => {
    led.material.emissiveIntensity = 1.4 + 1.2*Math.sin(t*6 + led.userData.phase);
  });
  rtds.forEach((r,i) => { r.material.emissiveIntensity = 0.9 + 0.4*Math.sin(t*1.2 + i); });

  if (noisePoints.visible) {
    const arr = noiseGeo.attributes.position.array;
    for (let i=0;i<noiseCount;i++){
      arr[i*3+0] += noiseVel[i*3+0] + Math.sin(t*0.5 + i)*0.0008;
      arr[i*3+1] += noiseVel[i*3+1];
      arr[i*3+2] += noiseVel[i*3+2] + Math.cos(t*0.5 + i)*0.0008;
      const x=arr[i*3+0], y=arr[i*3+1], z=arr[i*3+2];
      const r = Math.sqrt(x*x+z*z);
      if (r < 3.1) { const ang = Math.atan2(z,x);
        arr[i*3+0]=3.1*Math.cos(ang); arr[i*3+2]=3.1*Math.sin(ang);
        noiseVel[i*3+0]*=-1; noiseVel[i*3+2]*=-1; }
      else if (r > 8.0) { arr[i*3+0]*=0.78; arr[i*3+2]*=0.78; }
      if (y<0.1||y>5.5){ noiseVel[i*3+1]*=-1; arr[i*3+1] = Math.max(0.1,Math.min(5.5,y)); }
    }
    noiseGeo.attributes.position.needsUpdate = true;
    noiseMat.opacity = 0.45 + 0.15*Math.sin(t*1.7);
  }

  const sa = silGeo.attributes.position.array;
  for (let i=0;i<silenceCount;i++){
    sa[i*3+1] += 0.0006 + (i%3)*0.0002;
    if (sa[i*3+1] > 2.8) sa[i*3+1] = 0.2;
  }
  silGeo.attributes.position.needsUpdate = true;

  if (Math.floor(t*4) !== Math.floor((t-0.05)*4)) {
    const baseT2 = 4.0;
    const condBoost = (activeCondition.id === 'C5') ? 1.10 :
                      (activeCondition.id === 'C6') ? 1.18 : 1.00;
    const t2 = baseT2 * condBoost * (1 + (Math.random()-0.5)*0.04);
    elT2.textContent  = t2.toFixed(2) + ' ms';
    elB.textContent   = (8.5 + (Math.random()-0.5)*3).toFixed(1) + ' pT';
    elRF.textContent  = (-152 + (Math.random()-0.5)*2.5).toFixed(1) + ' dBm';
    elDT.textContent  = '±' + (0.008 + Math.random()*0.003).toFixed(3) + ' K';
    elVib.textContent = '8.2e-7 m/s²';
    const gammaBase = activeCondition.electrode * 12;
    elEEG.textContent = (gammaBase + (Math.random()-0.5)*2.5).toFixed(2) + ' μV²';
    elO2.textContent  = (20.9 + (Math.random()-0.5)*0.15).toFixed(2) + ' %';
  }

  composer.render();
}
